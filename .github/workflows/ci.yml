name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check nokap/ tests/
      - name: Ruff format check
        run: ruff format --check nokap/ tests/
      - name: Pyright
        run: pyright nokap/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Chrome (Linux)
        if: runner.os == 'Linux'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -e ".[dev]" great_tables pandas

      - name: Run unit tests
        run: pytest tests/ -v --ignore=tests/test_integration.py --ignore=tests/test_errors.py

      - name: Run integration tests
        run: pytest tests/test_integration.py tests/test_errors.py -v --timeout=120
